<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Responsive Webpage</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>My Responsive Website</h1>
        <nav>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h2>Welcome to My Website</h2>
            <p>This layout adapts to different screen sizes using media queries.</p>
        </section>

        <section class="cards">
            <div class="card">Card 1 Content</div>
            <div class="card">Card 2 Content</div>
            <div class="card">Card 3 Content</div>
        </section>
    </main>

    <footer>
        <p>© 2026 Responsive Design Example</p>
    </footer>

</body>

</html>
